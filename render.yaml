# Despliegue en Render: Dashboard → New → Blueprint → repo evangeliosAMT
# Un solo servicio: API + panel admin estático + programador de envío por email.
services:
  - type: web
    name: evangelio-api
    runtime: node
    plan: free
    rootDir: "evangelio web"
    buildCommand: "npm install && npm run build:deploy"
    startCommand: "npm start -w server"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: MONGODB_DB
        value: evangelios
      - key: JWT_EXPIRE
        value: "8h"
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: EVANGELIO_PRECACHE_AL_INICIO
        value: "0"
      - key: ENVIO_EMAIL_ACTIVO
        value: "1"
      - key: TZ_ENVIO
        value: America/Santiago
      - key: ENVIO_HORA_DEFAULT
        value: "07:00"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
