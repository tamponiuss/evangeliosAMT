# MongoDB local para desarrollo (sin contraseña).
# Arranque desde esta carpeta: docker compose up -d
# Luego MONGODB_URI=mongodb://127.0.0.1:27017/ en .env (o valores por defecto del código).
services:
  mongodb:
    image: mongo:7
    container_name: evangelio-mongodb
    ports:
      - '127.0.0.1:27017:27017'
    volumes:
      - evangelio_mongo_data:/data/db

volumes:
  evangelio_mongo_data:
