# Preferir el render.yaml de la raíz del repo (incluye panel admin + envíos).
services:
  - type: web
    name: evangelio-api
    runtime: node
    rootDir: "evangelio web"
    buildCommand: "npm install && npm run build:deploy"
    startCommand: "npm start -w server"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: MONGODB_DB
        value: evangelios
      - key: JWT_EXPIRE
        value: "8h"
      - key: EVANGELIO_PRECACHE_AL_INICIO
        value: "0"
      - key: ENVIO_EMAIL_ACTIVO
        value: "1"
      - key: TZ_ENVIO
        value: America/Santiago
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
